<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G-IV SP Weight & Balance Calculator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
        input[type=number]::-webkit-inner-spin-button,
        input[type=number]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type=number] {
            -moz-appearance: textfield;
        }
        .icon {
            width: 1.25rem;
            height: 1.25rem;
            margin-right: 0.75rem;
            stroke-width: 1.5;
        }
        .time-input {
            width: 4rem;
        }
        .seat {
            border: 1px solid #4a5568;
            background-color: #2d3748;
            border-radius: 0.375rem;
            padding: 0.5rem;
            text-align: center;
            font-size: 0.75rem;
            min-width: 50px;
        }
        .seat-input {
            width: 50px;
            background-color: #4a5568;
            border: 1px solid #718096;
            text-align: center;
            border-radius: 0.25rem;
        }
        .table-box {
            border: 2px solid #fdba74;
            background-color: #4a5568;
            border-radius: 0.25rem;
            width: 20px;
            height: 20px;
            align-self: center;
        }
        .component {
            border: 1px solid #4a5568;
            background-color: #2d3748;
            border-radius: 0.375rem;
            padding: 0.5rem;
            text-align: center;
            font-size: 0.875rem;
        }
        .cg-table th, .cg-table td {
            padding: 0.5rem 0.25rem;
            text-align: right;
            font-size: 0.875rem;
            vertical-align: middle;
        }
        .cg-table th:first-child, .cg-table td:first-child {
            text-align: left;
            font-weight: 500;
        }
        .total-row {
            background-color: #1f2937;
            font-weight: bold;
            color: #fcd34d;
        }
        .editable-cell-input {
            width: 100%;
            background-color: #4a5568;
            border: 1px solid #718096;
            text-align: right;
            border-radius: 0.25rem;
            padding-right: 0.25rem;
        }
        input:read-only {
            background-color: #374151;
            cursor: not-allowed;
        }
    </style>
</head>
<body class="bg-gray-900 text-gray-200">

    <div id="login-page" class="flex flex-col items-center justify-center min-h-screen px-4">
        <h1 class="text-3xl font-bold text-white mb-2 text-center">
            Weight & Balance Application
            <span class="block text-2xl text-amber-400 mt-2">Gulfstream IV SP SN1381</span>
            <span class="block text-xl text-amber-400">PK-TWY</span>
        </h1>
        <p class="text-sm text-gray-400 mb-8">by SkyOps Solutions</p>
        <div class="w-full max-w-sm p-6 bg-gray-800 rounded-lg shadow-md">
            <h2 class="text-2xl font-bold text-center text-white mb-6">Login</h2>
            <form id="login-form">
                <div class="mb-4">
                    <label for="username" class="block text-sm font-medium text-gray-300 mb-2">Username</label>
                    <input type="text" id="username" class="w-full p-2 bg-gray-700 text-white border border-gray-600 rounded-md focus:outline-none focus:ring-2 focus:ring-amber-400" required>
                </div>
                <div class="mb-6">
                    <label for="password" class="block text-sm font-medium text-gray-300 mb-2">Password</label>
                    <input type="password" id="password" class="w-full p-2 bg-gray-700 text-white border border-gray-600 rounded-md focus:outline-none focus:ring-2 focus:ring-amber-400" required>
                </div>
                <button type="submit" class="w-full bg-amber-500 hover:bg-amber-600 text-gray-900 font-bold py-2 px-4 rounded-lg">Login</button>
                <p id="login-error" class="text-red-400 text-sm mt-4 text-center hidden"></p>
            </form>
        </div>
    </div>

    <div id="admin-page" class="hidden container mx-auto max-w-4xl p-4 sm:p-6 bg-gray-900 min-h-screen">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-bold text-white">Admin Settings</h1>
            <button id="admin-logout-btn" class="bg-red-500 hover:bg-red-600 text-white font-bold py-2 px-4 rounded-lg">Logout</button>
        </div>
        
        <!-- Expiry Settings -->
        <div class="bg-gray-800 p-6 rounded-lg mb-6">
            <h2 class="text-lg font-semibold text-white mb-4">Application Expiry Date</h2>
            <div class="flex items-center space-x-4">
                <label for="expiry-date-input" class="text-sm font-medium text-gray-300">Set Expiry Date:</label>
                <input type="date" id="expiry-date-input" class="bg-gray-700 text-white p-2 border border-gray-600 rounded-md">
            </div>
            <button id="save-expiry-btn" class="mt-6 bg-amber-500 hover:bg-amber-600 text-gray-900 font-bold py-2 px-4 rounded-lg">Save Date</button>
            <p id="admin-message" class="text-green-400 text-sm mt-4 hidden"></p>
        </div>

        <!-- Pilot & Signature Settings -->
        <div class="bg-gray-800 p-6 rounded-lg mb-6">
            <h2 class="text-lg font-semibold text-white mb-4">Manajemen Pilot & Tanda Tangan</h2>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-1">Nama Pilot</label>
                    <input type="text" id="new-pilot-name" placeholder="Misal: Capt. Budi" class="w-full bg-gray-700 text-white p-2 border border-gray-600 rounded-md">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-1">URL Gambar Tanda Tangan (Opsional)</label>
                    <input type="text" id="new-pilot-url" placeholder="https://..." class="w-full bg-gray-700 text-white p-2 border border-gray-600 rounded-md">
                </div>
                <button id="add-pilot-btn" class="bg-green-500 hover:bg-green-600 text-white font-bold py-2 px-4 rounded-lg md:w-auto w-full">Tambah Pilot</button>
                <p id="pilot-admin-message" class="text-sm mt-2 hidden"></p>
            </div>
            <div class="mt-6">
                <h3 class="text-md font-semibold text-gray-300 mb-2">Daftar Pilot Tersimpan:</h3>
                <ul id="admin-pilots-list" class="space-y-2 text-sm text-gray-400 max-h-48 overflow-y-auto pr-2">
                    <!-- Populated by JS -->
                </ul>
            </div>
        </div>

        <!-- Additional Crew Management -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- Engineer Management -->
            <div class="bg-gray-800 p-6 rounded-lg">
                <h2 class="text-lg font-semibold text-white mb-4">Manajemen Engineer</h2>
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-300 mb-1">Nama Engineer</label>
                        <input type="text" id="new-engineer-name" placeholder="Misal: Diki Hariadi" class="w-full bg-gray-700 text-white p-2 border border-gray-600 rounded-md">
                    </div>
                    <button id="add-engineer-btn" class="bg-green-500 hover:bg-green-600 text-white font-bold py-2 px-4 rounded-lg w-full">Tambah Engineer</button>
                    <p id="engineer-admin-message" class="text-sm mt-2 hidden"></p>
                </div>
                <div class="mt-6">
                    <h3 class="text-md font-semibold text-gray-300 mb-2">Daftar Engineer:</h3>
                    <ul id="admin-engineer-list" class="space-y-2 text-sm text-gray-400 max-h-48 overflow-y-auto pr-2">
                        <!-- Populated by JS -->
                    </ul>
                </div>
            </div>

            <!-- Footer with PDF and Save Button -->
            <footer class="text-center mt-8 pb-4 flex flex-col items-center gap-3">
                <div class="flex gap-4 justify-center flex-wrap">
                    <button id="downloadPdfBtn" class="bg-amber-500 hover:bg-amber-600 text-gray-900 font-bold py-2 px-4 rounded-lg">
                        Download as PDF
                    </button>
                    <button id="saveCloudBtn" class="bg-blue-500 hover:bg-blue-600 text-white font-bold py-2 px-4 rounded-lg">
                        Save to Database
                    </button>
                </div>
                <p id="pdf-message" class="text-sm text-amber-400 hidden">Generating PDF...</p>
                <p id="cloud-message" class="text-sm text-blue-400 hidden">Saving to database...</p>
            </footer>

        </div>
    </div>
    
    <!-- Dynamically Populated Datalists -->
    <datalist id="pic-names"></datalist>
    <datalist id="copilot-names"></datalist>
    <datalist id="engineer-names"></datalist>
    <datalist id="cabin-service-names"></datalist>


    <script>
        // --- MASTER DATA (Akan diambil secara live dari Google Sheets) ---
        let pilotsData = [];
        let engineersData = ["-"]; // Tetap diberikan default "-" untuk pilihan kosong
        let cabinServicesData = ["-"]; // Tetap diberikan default "-" untuk pilihan kosong
        let users = {};

        function updatePilotDatalists() {
            const picDatalist = document.getElementById('pic-names');
            const copilotDatalist = document.getElementById('copilot-names');
            let optionsHtml = '';
            pilotsData.forEach(pilot => {
                optionsHtml += `<option value="${pilot.name}">\n`;
            });
            if (picDatalist) picDatalist.innerHTML = optionsHtml;
            if (copilotDatalist) copilotDatalist.innerHTML = optionsHtml;
        }

        function updateOtherDatalists() {
            const engDatalist = document.getElementById('engineer-names');
            const cabDatalist = document.getElementById('cabin-service-names');
            
            if (engDatalist) {
                engDatalist.innerHTML = engineersData.map(name => `<option value="${name}">`).join('\n');
            }
            if (cabDatalist) {
                cabDatalist.innerHTML = cabinServicesData.map(name => `<option value="${name}">`).join('\n');
            }
        }

        async function syncMasterData() {
            const payload = {
                action: 'syncMaster',
                pilots: pilotsData,
                engineers: engineersData,
                cabinServices: cabinServicesData
            };
            try {
                fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'text/plain' },
                    body: JSON.stringify(payload)
                });
                console.log('Master data sync requested.');
            } catch (e) {
                console.error('Sync failed', e);
            }
        }

        function renderAdminPilotList() {
            const listEl = document.getElementById('admin-pilots-list');
            if(!listEl) return;
            listEl.innerHTML = '';
            pilotsData.forEach((pilot, index) => {
                listEl.innerHTML += `
                    <li class="flex justify-between items-center bg-gray-700 p-2 rounded border border-gray-600">
                        <div>
                            <span class="block text-white font-medium">${pilot.name}</span>
                            <span class="block text-xs text-gray-400 overflow-hidden text-ellipsis w-48">${pilot.signatureUrl || 'Tanpa Tanda Tangan'}</span>
                        </div>
                        <button class="bg-red-500 hover:bg-red-600 text-white py-1 px-2 rounded text-xs" onclick="removePilot(${index})">Hapus</button>
                    </li>`;
            });
        }

        function renderAdminOtherLists() {
            const engList = document.getElementById('admin-engineer-list');
            const cabList = document.getElementById('admin-cabin-list');
            
            if(engList) {
                engList.innerHTML = engineersData.map((name, index) => `
                    <li class="flex justify-between items-center bg-gray-700 p-2 rounded border border-gray-600">
                        <span class="text-white font-medium">${name}</span>
                        ${name !== '-' ? `<button class="bg-red-500 hover:bg-red-600 text-white py-1 px-2 rounded text-xs" onclick="removeEngineer(${index})">Hapus</button>` : ''}
                    </li>`).join('');
            }
            
            if(cabList) {
                cabList.innerHTML = cabinServicesData.map((name, index) => `
                    <li class="flex justify-between items-center bg-gray-700 p-2 rounded border border-gray-600">
                        <span class="text-white font-medium">${name}</span>
                        ${name !== '-' ? `<button class="bg-red-500 hover:bg-red-600 text-white py-1 px-2 rounded text-xs" onclick="removeCabinService(${index})">Hapus</button>` : ''}
                    </li>`).join('');
            }
        }

        window.removePilot = function(index) {
            pilotsData.splice(index, 1);
            renderAdminPilotList();
            updatePilotDatalists();
            syncMasterData();
        };

        window.removeEngineer = function(index) {
            engineersData.splice(index, 1);
            renderAdminOtherLists();
            updateOtherDatalists();
            syncMasterData();
        };

        window.removeCabinService = function(index) {
            cabinServicesData.splice(index, 1);
            renderAdminOtherLists();
            updateOtherDatalists();
            syncMasterData();
        };

        // Initialize lists on load
        updatePilotDatalists();
        updateOtherDatalists();

        // --- EXPIRY & URL ---
        const DEFAULT_EXPIRY_DATE = '2025-10-25';

        // --- GOOGLE APPS SCRIPT URL ---
        // Endpoint GAS anda harus dikonfigurasi agar saat dipanggil parameter ?action=getMasterData
        // dapat mengembalikan JSON berisi objek { expiryDate, pilots, engineers, cabinServices, users }
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzUUdXcym39tV32bo5fXp-VRrPAMaUgBshvq5kWR_1RFxUsdi_ymZRRNEXKighLs34MkA/exec'; 

        // --- PAGE ELEMENTS ---
        const loginPage = document.getElementById('login-page');
        const appPage = document.getElementById('app-page');
        const adminPage = document.getElementById('admin-page');
        const expiredPage = document.getElementById('expired-page');
        const loginForm = document.getElementById('login-form');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const loginError = document.getElementById('login-error');
        const expiryDateInput = document.getElementById('expiry-date-input');
        const saveExpiryBtn = document.getElementById('save-expiry-btn');
        const adminMessage = document.getElementById('admin-message');
        const appLogoutBtn = document.getElementById('app-logout-btn');
        const adminLogoutBtn = document.getElementById('admin-logout-btn');

        // --- ELEMENT SELECTORS ---
        const inputs = { rampWeight: document.getElementById('rampWeight'), maxTakeoffWeight: document.getElementById('maxTakeoffWeight'), emptyWeight: document.getElementById('emptyWeight'), pilot: document.getElementById('pilot'), copilot: document.getElementById('copilot'), engineer: document.getElementById('engineer'), cabinService: document.getElementById('cabinService'), baggage: document.getElementById('baggage'), cockpitStorage: document.getElementById('cockpitStorage'), cabinStorage: document.getElementById('cabinStorage'), picName: document.getElementById('picName'), copilotName: document.getElementById('copilotName'), engineerName: document.getElementById('engineerName'), cabinServiceName: document.getElementById('cabinServiceName'), totalPob: document.getElementById('totalPob'), galley: document.getElementById('galley'), seat1: document.getElementById('seat1'), seat2: document.getElementById('seat2'), seat3: document.getElementById('seat3'), seat4: document.getElementById('seat4'), seat5: document.getElementById('seat5'), seat6: document.getElementById('seat6'), seat7: document.getElementById('seat7'), seat8: document.getElementById('seat8'), seat9: document.getElementById('seat9'), seat10: document.getElementById('seat10'), seat11: document.getElementById('seat11'), seat12: document.getElementById('seat12'), seat13: document.getElementById('seat13'), aftLavatory: document.getElementById('aftLavatory'), tripTimeHours: document.getElementById('tripTimeHours'), tripTimeMinutes: document.getElementById('tripTimeMinutes'), tripToAlternateHours: document.getElementById('tripToAlternateHours'), tripToAlternateMinutes: document.getElementById('tripToAlternateMinutes'), fuelConsumption: document.getElementById('fuelConsumption'), airspeed: document.getElementById('airspeed'), altitude: document.getElementById('altitude'), headwind: document.getElementById('headwind'), fuelOnBoard: document.getElementById('fuelOnBoard'), routeFrom: document.getElementById('routeFrom'), routeTo: document.getElementById('routeTo'), };
        const outputs = { pilotSeatWt: document.getElementById('pilotSeatWt'), copilotSeatWt: document.getElementById('copilotSeatWt'), jumpseatWt: document.getElementById('jumpseatWt'), baggageLayoutWt: document.getElementById('baggageLayoutWt'), cgTableBody: document.getElementById('cg-table-body'), totalPayloadLbs: document.getElementById('totalPayloadLbs'), totalPayloadKg: document.getElementById('totalPayloadKg'), zfwResult: document.getElementById('zfwResult'), towResult: document.getElementById('towResult'), zfwStatus: document.getElementById('zfwStatus'), towStatus: document.getElementById('towStatus'), landingWeightResult: document.getElementById('landingWeightResult'), landingWeightStatus: document.getElementById('landingWeightStatus'), extraFuelResult: document.getElementById('extraFuelResult'), availablePayloadLbs: document.getElementById('availablePayloadLbs'), availablePayloadKg: document.getElementById('availablePayloadKg'), availablePassengers: document.getElementById('availablePassengers'), zfwMacResult: document.getElementById('zfwMacResult'), towMacResult: document.getElementById('towMacResult'), landingWeightMacResult: document.getElementById('landingWeightMacResult'), elevatorTrimResult: document.getElementById('elevatorTrimResult'), maxRange: document.getElementById('maxRange'), fuelTripRequired: document.getElementById('fuelTripRequired'), alternateFuel: document.getElementById('alternateFuel'), reserveFuel: document.getElementById('reserveFuel'), contingencyFuel: document.getElementById('contingencyFuel'), startTaxiFuel: document.getElementById('startTaxiFuel'), totalFuelRequired: document.getElementById('totalFuelRequired'), welcomeMessage: document.getElementById('welcome-message') };
        let cgChart;
        
        // --- LOGIN & EXPIRY LOGIC ---
        let appExpiryDate = null; 
        let expiryCheckInterval; 

        async function fetchMasterData() {
             try {
                // Request action getMasterData ke GAS untuk menarik seluruh data sheet
                const response = await fetch(`${SCRIPT_URL}?action=getMasterData&t=${new Date().getTime()}`);
                if (!response.ok) throw new Error(`Network response was not ok. Status: ${response.status}`);
                const data = await response.json();
                if (data.error) throw new Error(`Apps Script Error: ${data.error}`);
                
                if (appExpiryDate && appExpiryDate !== data.expiryDate) {
                     console.log("Expiry date has been updated remotely. Re-checking status.");
                     appExpiryDate = data.expiryDate;
                     checkSessionValidity(); 
                }
                
                appExpiryDate = data.expiryDate || appExpiryDate;
                
                // Assign data dari Google Sheets ke local memory variable
                if (data.pilots) pilotsData = data.pilots;
                if (data.engineers) engineersData = data.engineers;
                if (data.cabinServices) cabinServicesData = data.cabinServices;
                if (data.users) users = data.users;

                // Update UI dengan data yang baru ditarik
                updatePilotDatalists();
                updateOtherDatalists();
                
                return appExpiryDate;

            } catch (error) {
                console.warn("Gagal mengambil data master terbaru dari server:", error);
                return appExpiryDate; 
            }
        }

        function checkSessionValidity() {
            if (!appExpiryDate) return;

            const expiryDate = new Date(appExpiryDate);
            const today = new Date();
            today.setHours(0, 0, 0, 0);

            if (today > expiryDate) {
                console.log("Aplikasi kedaluwarsa berdasarkan data terbaru. Mengakhiri sesi.");
                handleLogout(true);
            }
            updateExpiryCountdown();
        }

        async function initialExpiryCheck() {
            const date = await fetchMasterData();
            if (!date) {
                console.warn("Tidak dapat mengambil tanggal kedaluwarsa dari server, menggunakan tanggal default.");
                appExpiryDate = DEFAULT_EXPIRY_DATE; 
            }
            return checkIsExpiredNow();
        }

        function checkIsExpiredNow() {
            if (!appExpiryDate) return true; 
            const expiryDate = new Date(appExpiryDate);
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            return today > expiryDate;
        }

        async function handleLogin(event) {
            event.preventDefault();
            const loginButton = loginForm.querySelector('button');
            
            loginButton.disabled = true;
            loginButton.textContent = 'Fetching data & Verifying...';
            loginError.classList.add('hidden'); 

            const username = usernameInput.value;
            const password = passwordInput.value;

            try {
                // Tarik data secara aktual agar validasi akun mencakup data user terbaru
                await fetchMasterData();
                const user = users[username];

                if (user && user.password === password) {
                    const isExpired = checkIsExpiredNow(); // Tidak perlu await initial check lagi karena fetchMasterData sudah dipanggil di atas
                    if (isExpired && user.role !== 'admin') {
                        loginPage.classList.add('hidden');
                        if (expiredPage) expiredPage.classList.remove('hidden');
                    } else {
                        if (user.role === 'admin') {
                            loginPage.classList.add('hidden');
                            adminPage.classList.remove('hidden');
                            expiryDateInput.value = appExpiryDate;
                            renderAdminPilotList(); 
                            renderAdminOtherLists(); 
                        } else {
                            loginPage.classList.add('hidden');
                            appPage.classList.remove('hidden');
                            outputs.welcomeMessage.textContent = user.greeting || "Welcome!";
                            if (!cgChart) {
                                initializeCgEnvelope();
                            }
                            calculateAll();
                            updateExpiryCountdown();
                            if (expiryCheckInterval) clearInterval(expiryCheckInterval);
                            
                            // Ganti interval pengecekan dari 'fetchLatestExpiryDate' ke 'fetchMasterData'
                            expiryCheckInterval = setInterval(fetchMasterData, 15000); 
                        }
                    }
                } else {
                    loginError.textContent = 'Invalid username or password. (Note: Data user harus tersedia di Google Sheets)';
                    loginError.classList.remove('hidden');
                }
            } catch (error) {
                console.error("Login failed:", error);
                loginError.textContent = 'Login failed. Please check your connection and try again.';
                loginError.classList.remove('hidden');
            } finally {
                loginButton.disabled = false;
                loginButton.textContent = 'Login';
            }
        }
        
        function handleLogout(isExpired = false) { 
            if (expiryCheckInterval) {
                clearInterval(expiryCheckInterval); 
                expiryCheckInterval = null;
            }
            appPage.classList.add('hidden'); 
            adminPage.classList.add('hidden'); 
            
            if (isExpired) {
                 expiredPage.classList.remove('hidden'); 
                 loginPage.classList.add('hidden');
            } else {
                 expiredPage.classList.add('hidden');
                 loginPage.classList.remove('hidden'); 
            }
            
            loginForm.reset(); 
            loginError.classList.add('hidden'); 
            outputs.welcomeMessage.textContent = ''; 
        }

        async function handleSaveExpiry() {
            const newDate = expiryDateInput.value;
            if (newDate) {
                adminMessage.textContent = 'Saving...';
                adminMessage.classList.remove('hidden', 'text-red-400', 'text-green-400');
                
                const postUrl = new URL(SCRIPT_URL);
                postUrl.searchParams.append('date', newDate);

                try {
                    fetch(postUrl, { method: 'POST', mode: 'no-cors' });
                    appExpiryDate = newDate; 
                    adminMessage.textContent = 'Expiry date save request sent!';
                    adminMessage.classList.add('text-green-400');
                    console.log("Save request sent for new expiry date:", newDate);

                } catch (error) {
                    console.error("Error sending save request:", error);
                    adminMessage.textContent = 'Failed to send request.';
                    adminMessage.classList.add('text-red-400');
                } finally {
                    setTimeout(() => adminMessage.classList.add('hidden'), 4000);
                }
            }
        }

        // --- HANDLE TAMBAH PILOT VIA ADMIN ---
        document.getElementById('add-pilot-btn').addEventListener('click', () => {
            const nameInput = document.getElementById('new-pilot-name');
            const urlInput = document.getElementById('new-pilot-url');
            const msg = document.getElementById('pilot-admin-message');

            const name = nameInput.value.trim();
            const url = urlInput.value.trim();

            if(name) {
                pilotsData.push({ name: name, signatureUrl: url });
                nameInput.value = '';
                urlInput.value = '';
                msg.textContent = 'Pilot berhasil ditambahkan!';
                msg.className = 'text-sm mt-2 text-green-400';
                msg.classList.remove('hidden');
                
                renderAdminPilotList();
                updatePilotDatalists();
                syncMasterData();

.slice(1), cgData[key]); }); html += createRow('Baggage', cgData.baggage); html += createRow('Zero Fuel Weight (ZFW)', zfwTotal, true, true); html += createRow('Fuel', cgData.fuel); html += createRow('Take Off Weight (TOW)', towTotal, true, true); html += createRow('Landing Weight (LW)', lwTotal, true, true); outputs.cgTableBody.innerHTML = html; document.getElementById('emptyWeightInput').addEventListener('input', (e) => { inputs.emptyWeight.value = parseFloat(e.target.value) || 0; calculateAll(); }); document.getElementById('emptyWeightArmInput').addEventListener('input', (e) => { ARMS.emptyWeight = parseFloat(e.target.value) || 0; calculateAll(); }); document.getElementById('emptyWeightMacInput').addEventListener('input', (e) => { cgData.emptyWeight.mac = parseFloat(e.target.value) || 0; calculateAll(); }); }
        function updateSummariesAndFlightCalc(totalPayloadKg, totalPayloadLbs, zfwTotal, towTotal, lwTotal, maxZfwLimit, maxTowLimit, fuelConsumption, airspeed, headwind, fuelOnBoard, tripFuel) { outputs.totalPayloadKg.textContent = totalPayloadKg.toFixed(0); outputs.totalPayloadLbs.textContent = totalPayloadLbs.toFixed(0); outputs.zfwResult.textContent = zfwTotal.weight.toFixed(0); outputs.zfwMacResult.textContent = zfwTotal.mac.toFixed(2); updateStatus(outputs.zfwStatus, zfwTotal.weight, maxZfwLimit); outputs.towResult.textContent = towTotal.weight.toFixed(0); outputs.towMacResult.textContent = towTotal.mac.toFixed(2); updateStatus(outputs.towStatus, towTotal.weight, maxTowLimit); outputs.landingWeightResult.textContent = lwTotal.weight.toFixed(0); outputs.landingWeightMacResult.textContent = lwTotal.mac.toFixed(2); updateStatus(outputs.landingWeightStatus, lwTotal.weight, 66000); const availablePayloadLbs = maxTowLimit - towTotal.weight; const availablePayloadKg = availablePayloadLbs / KG_TO_LBS; const availablePassengers = availablePayloadKg > 0 ? Math.floor(availablePayloadKg / 80) : 0; outputs.availablePayloadLbs.textContent = availablePayloadLbs.toFixed(0); outputs.availablePayloadKg.textContent = availablePayloadKg.toFixed(0); outputs.availablePassengers.textContent = availablePassengers; const groundSpeed = airspeed - headwind; const maxRange = (fuelConsumption > 0 && groundSpeed > 0 && fuelOnBoard > 0) ? (fuelOnBoard / fuelConsumption) * groundSpeed : 0; outputs.maxRange.textContent = maxRange.toFixed(0); const fuelPerMinute = fuelConsumption > 0 ? fuelConsumption / 60 : 0; const totalAlternateTimeMinutes = (parseFloat(inputs.tripToAlternateHours.value) || 0) * 60 + (parseFloat(inputs.tripToAlternateMinutes.value) || 0); const calculatedAlternateFuel = totalAlternateTimeMinutes * fuelPerMinute; const calculatedReserveFuel = 30 * fuelPerMinute; const calculatedContingencyFuel = tripFuel * 0.10; const calculatedStartTaxiFuel = 400; const totalFuelRequired = tripFuel + calculatedAlternateFuel + calculatedReserveFuel + calculatedContingencyFuel + calculatedStartTaxiFuel; const extraFuel = fuelOnBoard - totalFuelRequired; outputs.extraFuelResult.textContent = extraFuel.toFixed(0); outputs.elevatorTrimResult.textContent = getElevatorTrimSetting(zfwTotal.mac, fuelOnBoard); outputs.fuelTripRequired.textContent = tripFuel.toFixed(1); outputs.alternateFuel.textContent = calculatedAlternateFuel.toFixed(1); outputs.reserveFuel.textContent = calculatedReserveFuel.toFixed(1); outputs.contingencyFuel.textContent = calculatedContingencyFuel.toFixed(1); outputs.startTaxiFuel.textContent = calculatedStartTaxiFuel.toFixed(1); outputs.totalFuelRequired.textContent = totalFuelRequired.toFixed(1); }
        function updateStatus(element, value, limit) { element.classList.remove('text-green-500', 'text-red-500', 'text-yellow-400'); if (value <= 0) { element.textContent = 'Awaiting Input'; element.classList.add('text-yellow-400'); } else if (value > limit) { element.textContent = 'OVERWEIGHT'; element.classList.add('text-red-500'); } else { element.textContent = 'OK'; element.classList.add('text-green-500'); } }
